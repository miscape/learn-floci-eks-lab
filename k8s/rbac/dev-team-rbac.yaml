apiVersion: v1
kind: Namespace
metadata:
  name: dev-team
  labels:
    project: learn-floci-eks-lab
    environment: local
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-user
  namespace: dev-team
  labels:
    project: learn-floci-eks-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-namespace-role
  namespace: dev-team
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-namespace-rolebinding
  namespace: dev-team
subjects:
  - kind: ServiceAccount
    name: devops-user
    namespace: dev-team
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: devops-namespace-role
